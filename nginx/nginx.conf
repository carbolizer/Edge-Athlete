server {

    listen 80;

    # Resolve recreated Compose services without requiring an Nginx restart.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $django_upstream http://django:8000;
    set $react_upstream http://react:80;

    # If the URL starts with /api/ send it to django:8000
    location /api/ {

        client_max_body_size 2m;

        # Forward the request to the django container on the internal docker network
        proxy_pass $django_upstream;

        # Tell django what the original hostname was
        proxy_set_header Host $host;

        # Tell Django the real IP address of the browser
        # Without this Django only sees Nginx's IP, not the actual client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    error_page 413 = @request_too_large;
    location @request_too_large {
        internal;
        default_type application/json;
        add_header Cache-Control "private, no-store" always;
        add_header Pragma "no-cache" always;
        return 413 '{"code":"request_too_large","detail":"Request body exceeds the proxy limit."}';
    }

    # If the URL starts with /admin/ send it to django:8000
    location /admin/ {

        # Forward the request to the django container on the internal docker network
        proxy_pass $django_upstream;

        # Tell django what the original hostname was
        proxy_set_header Host $host;

        # Tell Django the real IP address of the browser
        # Without this Django only sees Nginx's IP, not the actual client
        proxy_set_header X-Real-IP $remote_addr;
    }
    # Django admin static files
    location /static/admin/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Django rest framework static files
    location /static/rest_framework/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything that did not match /api/ (all React frontend requests (HTML, CSS, JS, images))
    location / {

        # Forward the request to the React container on the internal Docker network
        proxy_pass $react_upstream;

        # Same as above — pass original hostname to React
        proxy_set_header Host $host;

        # Same as above — pass real client IP to React
        proxy_set_header X-Real-IP $remote_addr;


        # proxy websocket no longer needed since not using vite server
    }
}
