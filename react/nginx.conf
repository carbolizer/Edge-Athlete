# nginx.conf — how the React container serves the built app.
# This app is a single-page app: the server only has real files for assets and
# one index.html. When someone opens a client-side route like /connection-test
# there's no file at that path, so we fall back to index.html and let React look
# at the URL and render the right page. Without this, any URL other than "/"
# would 404. (The main Nginx forwards all non-/api requests here.)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
