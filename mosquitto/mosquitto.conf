# mosquitto.conf — the broker's two front doors.
# Mosquitto is the post office every message passes through. This file gives it
# two doors into the same building: door 1883 for hardware nodes and Django
# (plain MQTT), and door 9001 for browsers (the exact same MQTT, just wrapped in
# WebSockets so a web page can walk in). Same mail, same sorting room, two doors.
# Anonymous access is fine through Sprint 3; broker auth/ACLs are a Phase 12 job.

listener 1883
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true
